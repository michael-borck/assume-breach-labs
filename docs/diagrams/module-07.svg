<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 462" font-family="system-ui" role="img" aria-label="Network map for module 07"><defs><style>:root{--surface:#fff;--ink:#14202e;--muted:#5b6775;--line:#c7d0dd;--accent:#256b64;--accent-soft:#d7ebe8;--z1:#e9f2ff;--z1l:#9cc0ef;--z2:#fdeee6;--z2l:#e6b48f;--z3:#e7f6ec;--z3l:#9dccae;}@media(prefers-color-scheme:dark){:root{--surface:#161f2c;--ink:#e6ecf3;--muted:#93a1b1;--line:#324357;--accent:#52b3a8;--accent-soft:#123531;--z1:#13233a;--z1l:#2f5680;--z2:#301f18;--z2l:#7a5237;--z3:#12271b;--z3l:#2f5c40;}}
    .zone{fill:var(--surface);stroke:var(--line);stroke-width:1.5}
