# Assume Breach Labs — single compose file for the whole series.
#
# Every service belongs to a module PROFILE. Starting a module starts only that
# module's services:
#
#   docker compose --profile module-07 up -d      # or: make m07
#
# As more modules are built, add their services here under a new profile and a
# new network block. Keep network names + subnets unique across the whole file.
#
# DATA POLICY (see docs note in README): small lab data (<~1MB) is BAKED into the
# module image — portable everywhere, no host bind mounts. Large data (pcaps, disk
# images) will use a NAMED VOLUME populated at runtime, never a host bind mount,
# so it works on macOS/exFAT, Windows and Linux alike.

services:

  # ======================================================================
  # Module 01 — Access Control & Isolation. A single Linux workstation where
  # the student is root, managing users/groups/permissions/ACLs on an office
  # fileshare. Replaces the Windows-XP NTFS-permissions lab.
  # ======================================================================
  m01-station:
    build:
      context: ./modules/module-01-access-control/station
      dockerfile: Dockerfile
    image: ghcr.io/michael-borck/assume-breach-accesslab:latest
    container_name: m01-station
    hostname: station
    profiles: ["module-01"]
    command: ["sleep", "infinity"]

  # ======================================================================
  # Module 02 — Port Scanning. An attacker workstation (nmap) and a small
  # internal target network with hosts running different services. Replaces
  # the original lab's scans of live internet hosts — lawful and reliable.
  #   web    10.2.0.20  HTTP 80
  #   files  10.2.0.30  SSH 22, FTP 21
  #   app    10.2.0.40  HTTP 8080, mystery banner 9000
  # ======================================================================
  m02-attacker:
    image: ghcr.io/michael-borck/assume-breach-base:latest
    container_name: m02-attacker
    hostname: attacker
    profiles: ["module-02"]
    user: "root"                 # nmap SYN/OS scans need root + raw sockets
    cap_add: ["NET_RAW", "NET_ADMIN"]
    command: ["sleep", "infinity"]
    networks:
      m02-net:
        ipv4_address: 10.2.0.10

  m02-web:
    image: nginx:alpine
    container_name: m02-web
    hostname: web
    profiles: ["module-02"]
    networks:
      m02-net:
        ipv4_address: 10.2.0.20

  m02-files:
    build:
      context: ./modules/module-02-port-scanning/target
    image: ghcr.io/michael-borck/assume-breach-target:latest
    container_name: m02-files
    hostname: files
    profiles: ["module-02"]
    environment:
      START_SSH: "1"
      START_FTP: "1"
    networks:
      m02-net:
        ipv4_address: 10.2.0.30

  m02-app:
    image: ghcr.io/michael-borck/assume-breach-target:latest
    container_name: m02-app
    hostname: app
    profiles: ["module-02"]
    environment:
      START_HTTP: "1"
      HTTP_PORT: "8080"
      HTTP_TITLE: "App Server"
      START_BANNER: "1"
      BANNER_PORT: "9000"
      BANNER_TEXT: "Custom-App 2.1"
    networks:
      m02-net:
        ipv4_address: 10.2.0.40

  # ======================================================================
  # Module 03 — Password Attacks. A self-contained cracking workstation
  # (John the Ripper, fcrackzip) with hashes, a wordlist, and an encrypted
  # zip baked into the image (~10 KB of data). No target network needed.
  # ======================================================================
  m03-station:
    build:
      context: ./modules/module-03-password-attacks/station
      dockerfile: Dockerfile
    image: ghcr.io/michael-borck/assume-breach-cracking:latest
    container_name: m03-station
    hostname: station
    profiles: ["module-03"]
    command: ["sleep", "infinity"]

  # ======================================================================
  # Module 04 — Cryptography. A single self-contained workstation with the
  # cipher tool + GnuPG. All offline; replaces the original lab's web tools
  # (rumkin, pgpkeygen, onlinepgp).
  # ======================================================================
  m04-station:
    build:
      context: ./modules/module-04-cryptography/station
      dockerfile: Dockerfile
    image: ghcr.io/michael-borck/assume-breach-crypto:latest
    container_name: m04-station
    hostname: station
    profiles: ["module-04"]
    command: ["sleep", "infinity"]

  # ======================================================================
  # Module 05 — Risk Management. Serves a single self-contained web page (an
  # SLE/ARO/ALE calculator) to the student's browser at http://localhost:8055.
  # Replaces the original Excel exercise. Browser-based, no CLI.
  # ======================================================================
  m05-web:
    build:
      context: ./modules/module-05-risk/web
      dockerfile: Dockerfile
    image: ghcr.io/michael-borck/assume-breach-riskcalc:latest
    container_name: m05-web
    hostname: riskcalc
    profiles: ["module-05"]
    ports:
      - "8055:80"

  # ======================================================================
  # Module 06 — Packet Capture & Analysis. Wireshark in the browser
  # (LinuxServer.io, web GUI on 3000 -> host 3006). Our teaching captures are
  # baked into /pcaps; `fetch` downloads extra real-world samples on demand.
  # ======================================================================
  m06-wireshark:
    build:
      context: ./modules/module-06-packet-capture/wireshark
      dockerfile: Dockerfile
    image: ghcr.io/michael-borck/assume-breach-wireshark:latest
    container_name: m06-wireshark
    hostname: wireshark
    profiles: ["module-06"]
    cap_add: ["NET_ADMIN"]
    security_opt: ["seccomp:unconfined"]
    shm_size: "1gb"
    ports:
      - "3006:3000"

  # ======================================================================
  # Module 08 — Digital Forensics. A single workstation with two offline Python
  # tools: mailtrace (email header analysis) and stylometry (authorship). Text
  # data only; replaces the online header tools + Windows 'Signature' app.
  # ======================================================================
  m08-station:
    build:
      context: ./modules/module-08-forensics/station
      dockerfile: Dockerfile
    image: ghcr.io/michael-borck/assume-breach-forensics:latest
    container_name: m08-station
    hostname: station
    profiles: ["module-08"]
    command: ["sleep", "infinity"]

  # ======================================================================
  # Module 09 — Human Factors. Two browser pieces: a self-hosted security
  # awareness quiz (nginx, :8090) and a set of HTTPS sites with deliberately
  # broken certificates (:8443-8445) so students see real browser warnings.
  # Replaces the external OpenDNS/eSafety quizzes and badssl.com.
  # ======================================================================
  m09-quiz:
    build:
      context: ./modules/module-09-human-factors/quiz
      dockerfile: Dockerfile
    image: ghcr.io/michael-borck/assume-breach-quiz:latest
    container_name: m09-quiz
    hostname: quiz
    profiles: ["module-09"]
    ports:
      - "8090:80"

  m09-certs:
    build:
      context: ./modules/module-09-human-factors/badcerts
      dockerfile: Dockerfile
    image: ghcr.io/michael-borck/assume-breach-badcerts:latest
    container_name: m09-certs
    hostname: badcerts
    profiles: ["module-09"]
    ports:
      - "8443:8443"
      - "8444:8444"
      - "8445:8445"

  # ======================================================================
  # Module 07 — Firewalls (replaces the Windows-only iNetworkSimulator with
  # real iptables/nftables across two routed networks).
  #
  # Topology:
  #   inside  net 10.1.1.0/24   pc1 = .2      firewall inside = .254
  #   outside net 10.1.2.0/24   pc2 = .3      firewall outside = .254
  #                             pc3 = .4
  #                             pc4 = .5
  #   dns (dnsmasq) sits on the inside net at 10.1.1.253
  #
  # The firewall container routes between the two nets. Students apply and edit
  # the iptables ruleset to see DROP vs REJECT and rule-ordering effects.
  # ======================================================================

  m07-firewall:
    build:
      context: ./modules/module-07-firewalls
      dockerfile: node/Dockerfile
    image: ghcr.io/michael-borck/assume-breach-node:latest
    container_name: m07-firewall
    hostname: firewall
    profiles: ["module-07"]
    cap_add: ["NET_ADMIN"]
    sysctls:
      - net.ipv4.ip_forward=1
    command: ["/firewall-entrypoint.sh"]
    networks:
      m07-inside:
        ipv4_address: 10.1.1.254
      m07-outside:
        ipv4_address: 10.1.2.254

  m07-pc1:
    image: ghcr.io/michael-borck/assume-breach-node:latest
    container_name: m07-pc1
    hostname: pc1
    profiles: ["module-07"]
    cap_add: ["NET_ADMIN"]
    command: ["/pc-entrypoint.sh"]
    environment:
      ROUTE_NET: 10.1.2.0/24
      ROUTE_GW: 10.1.1.254
      DNS_SERVER: 10.1.1.253
    depends_on: [m07-firewall]
    networks:
      m07-inside:
        ipv4_address: 10.1.1.2

  m07-pc2:
    image: ghcr.io/michael-borck/assume-breach-node:latest
    container_name: m07-pc2
    hostname: pc2
    profiles: ["module-07"]
    cap_add: ["NET_ADMIN"]
    command: ["/pc-entrypoint.sh"]
    environment:
      ROUTE_NET: 10.1.1.0/24
      ROUTE_GW: 10.1.2.254
    depends_on: [m07-firewall]
    networks:
      m07-outside:
        ipv4_address: 10.1.2.3

  m07-pc3:
    image: ghcr.io/michael-borck/assume-breach-node:latest
    container_name: m07-pc3
    hostname: pc3
    profiles: ["module-07"]
    cap_add: ["NET_ADMIN"]
    command: ["/pc-entrypoint.sh"]
    environment:
      ROUTE_NET: 10.1.1.0/24
      ROUTE_GW: 10.1.2.254
    depends_on: [m07-firewall]
    networks:
      m07-outside:
        ipv4_address: 10.1.2.4

  m07-pc4:
    image: ghcr.io/michael-borck/assume-breach-node:latest
    container_name: m07-pc4
    hostname: pc4
    profiles: ["module-07"]
    cap_add: ["NET_ADMIN"]
    command: ["/pc-entrypoint.sh"]
    environment:
      ROUTE_NET: 10.1.1.0/24
      ROUTE_GW: 10.1.2.254
    depends_on: [m07-firewall]
    networks:
      m07-outside:
        ipv4_address: 10.1.2.5

  m07-dns:
    image: ghcr.io/michael-borck/assume-breach-node:latest
    container_name: m07-dns
    hostname: dns
    profiles: ["module-07"]
    command: ["dnsmasq", "-k", "--log-queries", "--conf-file=/etc/dnsmasq/dnsmasq.conf"]
    networks:
      m07-inside:
        ipv4_address: 10.1.1.253

  # ======================================================================
  # Module 10 — Web Security. A deliberately vulnerable web app (OWASP
  # Juice Shop, public image, pull-only). Students exploit SQL injection,
  # XSS and broken authentication in a safe, legal target, then map each
  # flaw to a defence. Browser-based, no CLI.
  # ======================================================================
  m10-web:
    image: bkimminich/juice-shop:latest
    container_name: m10-web
    hostname: webapp
    profiles: ["module-10"]
    ports:
      - "3010:3000"

networks:
  m02-net:
    name: m02-net
    ipam:
      config:
        - subnet: 10.2.0.0/24
  m07-inside:
    name: m07-inside
    ipam:
      config:
        - subnet: 10.1.1.0/24
  m07-outside:
    name: m07-outside
    ipam:
      config:
        - subnet: 10.1.2.0/24
