name: Build base image

# Builds base.Dockerfile and publishes it to GHCR as
# ghcr.io/michael-borck/assume-breach-base so students can pull the toolbox image
# instead of building it. base.Dockerfile stays in the repo as a fallback:
# `make build-base` tags a local build with the same image name.

on:
  push:
    branches: [main]
    paths:
      - base.Dockerfile
      - .github/workflows/build-base.yml
  workflow_dispatch:
    inputs:
      platforms:
        description: "Platforms to build (linux/amd64,linux/arm64)"
        required: false
        default: "linux/amd64,linux/arm64"
  schedule:
    # Refresh weekly — Kali rolling + tool packages update frequently.
    - cron: "17 4 * * 1"

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/assume-breach-base

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=schedule

      - name: Resolve platforms
        id: plat
        run: |
          if [ -n "${{ inputs.platforms }}" ]; then
            echo "platforms=${{ inputs.platforms }}" >> "$GITHUB_OUTPUT"
          else
            echo "platforms=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./base.Dockerfile
          platforms: ${{ steps.plat.outputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
